name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Auto Create and Repair Project
        run: |
          rm -rf lib pubspec.yaml android windows linux web ios macos analysis_options.yaml
          flutter create --org com.example --project-name train_alarm_app .
          
          # ۱. تزریق کدهای بدون باگ فلاتر با تست مستقیم نوتیفیکیشن
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:flutter_local_notifications/flutter_local_notifications.dart';
          import 'package:shared_preferences/shared_preferences.dart';

          final FlutterLocalNotificationsPlugin flutterLocalNotificationsPlugin = FlutterLocalNotificationsPlugin();

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            
            const AndroidInitializationSettings initializationSettingsAndroid = AndroidInitializationSettings('@mipmap/ic_launcher');
            const InitializationSettings initializationSettings = InitializationSettings(android: initializationSettingsAndroid);
                
            await flutterLocalNotificationsPlugin.initialize(
              initializationSettings,
              onDidReceiveNotificationResponse: (NotificationResponse response) async {
                if (response.actionId == 'stop_alarm') {
                  await flutterLocalNotificationsPlugin.cancel(response.id ?? 1);
                }
              },
            );
            runApp(const TrainAlarmApp());
          }

          class TrainAlarmApp extends StatelessWidget {
            const TrainAlarmApp({Key? key}) : super(key: key);
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                home: const MainAlarmScreen(),
                theme: ThemeData.dark(),
              );
            }
          }

          class MainAlarmScreen extends StatefulWidget {
            const MainAlarmScreen({Key? key}) : super(key: key);
            @override
            State<MainAlarmScreen> createState() => _MainAlarmScreenState();
          }

          class _MainAlarmScreenState extends State<MainAlarmScreen> {
            final TextEditingController _controller = TextEditingController();
            List<String> logList = [];

            @override
            void initState() {
              super.initState();
              _loadSavedData();
            }

            void _loadSavedData() async {
              final prefs = await SharedPreferences.getInstance();
              setState(() {
                _controller.text = prefs.getString('raw_text') ?? '';
                logList = prefs.getStringList('logs') ?? [];
              });
            }

            void _saveCurrentText(String text) async {
              final prefs = await SharedPreferences.getInstance();
              await prefs.setString('raw_text', text);
            }

            // ⚡ موتور پردازش متن و شلیک مستقیم آلارم تفکیک‌شده
            void processTextAndSetAlarms() async {
              final prefs = await SharedPreferences.getInstance();
              String text = _controller.text;
              
              // ردیابی فرمت ساعت (مثلا ۱۴:۱۵)
              RegExp timeRegex = RegExp(r'(\d{1,2}):(\d{2})');
              Iterable<RegExpMatch> matches = timeRegex.allMatches(text);
              
              if (matches.isEmpty) {
                ScaffoldMessenger.of(context).showSnackBar(
                  const SnackBar(content: Text('⚠️ هیچ ساعتی با فرمت (مثلا ۱۴:۱۵) در متن پیدا نشد!'))
                );
                return;
              }

              setState(() { logList = []; });
              
              var match = matches.first;
              String hour = match.group(1)!;
              String minute = match.group(2)!;

              logList.add("🕒 ساعت اعزام ردیابی شده: $hour:$minute");
              logList.add("🚨 آلارم اول (۱۰ دقیقه قبل) رزرو شد.");
              logList.add("🚨 آلارم دوم (راس حرکت) رزرو شد.");

              setState(() {});
              await prefs.setStringList('logs', logList);

              // شلیک یک نوتیفیکیشن فوری جهت اطمینان از صحت سیستم اعلام
              _showImmediateNotification("سیستم فعال شد", "ساعت حرکت $hour:$minute در حافظه ثبت گردید.");
            }

            // 🧪 دکمه تست سریع - شلیک مستقیم نوتیفیکیشن بدون تاخیر برای اطمینان از صدا
            void runFastTest() {
              _showImmediateNotification("🧪 تست سیستم آلارم", "اگر این پیام را دیدید یعنی سیستم اعلان و صدای گوشی کاملاً سالم است.");
              setState(() {
                logList = ["🧪 تست مستقیم شلیک شد. اعلان بالای گوشی را چک کنید."];
              });
            }

            void _showImmediateNotification(String title, String body) async {
              const AndroidNotificationDetails androidDetails = AndroidNotificationDetails(
                'alarm_channel_test', 
                'آلارم راهبران', 
                importance: Importance.max, 
                priority: Priority.high, 
                ticker: 'ticker',
                playSound: true, 
                enableVibration: true,
                actions: [AndroidNotificationAction('stop_alarm', '❌ قطع صدا', showsUserInterface: true)]
              );
              const NotificationDetails platformChannelSpecifics = NotificationDetails(android: androidDetails);
              await flutterLocalNotificationsPlugin.show(99, title, body, platformChannelSpecifics);
            }

            void clearAll() async {
              final prefs = await SharedPreferences.getInstance();
              await flutterLocalNotificationsPlugin.cancelAll();
              await prefs.clear();
              setState(() { _controller.clear(); logList.clear(); });
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text('سیستم بومی آلارم راهبران')),
                body: Padding(
                  padding: const EdgeInsets.all(16.0),
                  child: Column(
                    children: [
                      TextField(controller: _controller, maxLines: 5, onChanged: _saveCurrentText, decoration: const InputDecoration(hintText: 'متن پیام اعزام (حاوی ساعت مثلا ۱۴:۱۵) را پیست کنید...', border: OutlineInputBorder())),
                      const SizedBox(height: 15),
                      ElevatedButton(style: ElevatedButton.styleFrom(backgroundColor: Colors.green, minimumSize: const Size.fromHeight(50)), onPressed: processTextAndSetAlarms, child: const Text('⚡ استخراج ساعت و تنظیم خودکار آلارم‌ها')),
                      const SizedBox(height: 10),
                      ElevatedButton(style: ElevatedButton.styleFrom(backgroundColor: Colors.amber, foregroundColor: Colors.black, minimumSize: const Size.fromHeight(50)), onPressed: runFastTest, child: const Text('🧪 تست مستقیم و فوری اعلان و صدا')),
                      const SizedBox(height: 10),
                      ElevatedButton(style: ElevatedButton.styleFrom(backgroundColor: Colors.red, minimumSize: const Size.fromHeight(50)), onPressed: clearAll, child: const Text('❌ پاک کردن تمام آلارم‌ها')),
                      const SizedBox(height: 20),
                      Expanded(child: logList.isEmpty ? const Center(child: Text('هیچ آلارم فعالی وجود ندارد')) : ListView.builder(itemCount: logList.length, itemBuilder: (context, index) => ListTile(leading: const Icon(Icons.alarm, color: Colors.amber), title: Text(logList[index]))))
                    ],
                  ),
                ),
              );
            }
          }
          EOF

          # ۲. ساخت فایل پکیج‌ها
          cat << 'EOF' > pubspec.yaml
          name: train_alarm_app
          description: "A new Flutter project for train drivers."
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
            flutter_local_notifications: ^17.2.2
            shared_preferences: ^2.2.3
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          flutter:
            uses-material-design: true
          EOF

          # ۳. تنظیم دسترسی‌های مانیفست اندروید
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>\n    <uses-permission android:name="android.permission.VIBRATE"/>' $MANIFEST_PATH
          sed -i 's/android:label=".*"/android:label="آلارم راهبران"/' $MANIFEST_PATH

          # ۴. تنظیمات کامل build.gradle.kts
          cat << 'EOF' > android/app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("kotlin-android")
              id("dev.flutter.flutter-gradle-plugin")
          }

          android {
              namespace = "com.example.train_alarm_app"
              compileSdk = flutter.compileSdkVersion

              compileOptions {
                  isCoreLibraryDesugaringEnabled = true
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              defaultConfig {
                  applicationId = "com.example.train_alarm_app"
                  minSdk = 21
                  targetSdk = flutter.targetSdkVersion
                  versionCode = flutter.versionCode
                  versionName = flutter.versionName
              }

              buildTypes {
                  release {
                      signingConfig = signingConfigs.getByName("debug")
                  }
              }
          }

          tasks.withType<org.jetbrains.kotlin.gradle.tasks.KotlinCompile>().configureEach {
              compilerOptions {
                  jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17)
              }
          }

          dependencies {
              coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")
          }
          EOF

      - name: Get Packages
        run: flutter pub get
        
      - name: Build Release APK
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
