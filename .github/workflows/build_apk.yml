name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Auto Create and Repair Project
        run: |
          rm -rf lib pubspec.yaml android windows linux web ios macos analysis_options.yaml
          flutter create --org com.example --project-name train_alarm_app .
          
          # ۱. کدهای فلاتر مجهز به محاسبه زنده زمان باقی‌مانده
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:android_alarm_manager_plus/android_alarm_manager_plus.dart';
          import 'package:flutter_local_notifications/flutter_local_notifications.dart';
          import 'package:shared_preferences/shared_preferences.dart';
          import 'dart:async';

          final FlutterLocalNotificationsPlugin flutterLocalNotificationsPlugin = FlutterLocalNotificationsPlugin();

          @pragma('vm:entry-point')
          void fireAlarmCallback(int id) async {
            WidgetsFlutterBinding.ensureInitialized();
            const AndroidNotificationDetails androidDetails = AndroidNotificationDetails(
              'train_hardware_channel_v7',
              'آلارم‌های اصلی راهبران',
              channelDescription: 'اعلان‌های حیاتی حرکت و حضور روی سکو',
              importance: Importance.max,
              priority: Priority.high,
              playSound: true,
              enableVibration: true,
            );
            const NotificationDetails platformChannelSpecifics = NotificationDetails(android: androidDetails);
            
            String title = (id % 2 == 1) ? "🚨 زمان حضور روی سکو!" : "🚨 آماده‌ی اعزام و حرکت!";
            String body = (id % 2 == 1) ? "۱۰ دقیقه به زمان شروع باقی مانده است." : "ساعت حرکت نهایی فرا رسیده است.";
            
            await flutterLocalNotificationsPlugin.show(id, title, body, platformChannelSpecifics);
          }

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            await AndroidAlarmManager.initialize();
            
            const AndroidInitializationSettings initializationSettingsAndroid = AndroidInitializationSettings('@mipmap/ic_launcher');
            const InitializationSettings initializationSettings = InitializationSettings(android: initializationSettingsAndroid);
            await flutterLocalNotificationsPlugin.initialize(initializationSettings);

            final AndroidFlutterLocalNotificationsPlugin? androidImplementation =
                flutterLocalNotificationsPlugin.resolvePlatformSpecificImplementation<AndroidFlutterLocalNotificationsPlugin>();
            if (androidImplementation != null) {
              await androidImplementation.createNotificationChannel(const AndroidNotificationChannel(
                'train_hardware_channel_v7',
                'آلارم‌های اصلی راهبران',
                description: 'اعلان‌های حیاتی حرکت و حضور روی سکو',
                importance: Importance.max,
                playSound: true,
                enableVibration: true,
              ));
            }

            runApp(const TrainAlarmApp());
          }

          class TrainAlarmApp extends StatelessWidget {
            const TrainAlarmApp({Key? key}) : super(key: key);
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                home: const MainAlarmScreen(),
                theme: ThemeData.dark(),
              );
            }
          }

          class MainAlarmScreen extends StatefulWidget {
            const MainAlarmScreen({Key? key}) : super(key: key);
            @override
            State<MainAlarmScreen> createState() => _MainAlarmScreenState();
          }

          class _MainAlarmScreenState extends State<MainAlarmScreen> {
            final TextEditingController _controller = TextEditingController();
            List<String> rawAlarmsData = [];
            List<String> displayLogs = [];
            Timer? _uiTimer;

            @override
            void initState() {
              super.initState();
              _loadSavedData();
              _uiTimer = Timer.periodic(const Duration(minutes: 1), (timer) {
                _updateRemainingTimesDisplay();
              });
            }

            @override
            void dispose() {
              _uiTimer?.cancel();
              super.dispose();
            }

            void _loadSavedData() async {
              final prefs = await SharedPreferences.getInstance();
              setState(() {
                _controller.text = prefs.getString('raw_text') ?? '';
                rawAlarmsData = prefs.getStringList('raw_alarms_data') ?? [];
              });
              _updateRemainingTimesDisplay();
            }

            void _saveData(String text, List<String> alarms) async {
              final prefs = await SharedPreferences.getInstance();
              await prefs.setString('raw_text', text);
              await prefs.setStringList('raw_alarms_data', alarms);
            }

            void _updateRemainingTimesDisplay() {
              if (rawAlarmsData.isEmpty) {
                setState(() { displayLogs = []; });
                return;
              }

              List<String> updatedLogs = [];
              DateTime now = DateTime.now();

              for (String alarmInfo in rawAlarmsData) {
                List<String> parts = alarmInfo.split('|');
                if (parts.length < 3) continue;

                String type = parts[0];
                int h = int.parse(parts[1]);
                int m = int.parse(parts[2]);

                DateTime alarmTime = DateTime(now.year, now.month, now.day, h, m);
                if (alarmTime.isBefore(now)) {
                  alarmTime = alarmTime.add(const Duration(days: 1));
                }

                Duration difference = alarmTime.difference(now);
                int remainingMinutes = difference.inMinutes;
                int remainingHours = difference.inHours;

                String timeString = "${h.toString().padLeft(2, '0')}:${m.toString().padLeft(2, '0')}";
                String remainingText = "";

                if (remainingMinutes <= 0) {
                  remainingText = "✅ زمانش فرا رسید / گذشت";
                } else if (remainingHours > 0) {
                  remainingText = "⏳ (${remainingHours} ساعت و ${remainingMinutes % 60} دقیقه مانده)";
                } else {
                  remainingText = "⏳ (${remainingMinutes} دقیقه مانده)";
                }

                if (type == "HEAD") {
                  updatedLogs.add("📌 خط زمان: $timeString");
                } else if (type == "PLATFORM") {
                  updatedLogs.add("  🔹 آلارم سکو ساعت $timeString  $remainingText");
                } else if (type == "MOVE") {
                  updatedLogs.add("  🔸 آلارم حرکت ساعت $timeString  $remainingText");
                }
              }

              setState(() { displayLogs = updatedLogs; });
            }

            void processTextAndSetAlarms() async {
              String text = _controller.text;
              List<String> lines = text.split('\n');
              
              List<String> newRawData = [];
              RegExp timeRegex = RegExp(r'(\d{1,2}):(\d{2})');
              DateTime now = DateTime.now();

              int alarmIdCounter = 1;
              await flutterLocalNotificationsPlugin.cancelAll();

              for (String line in lines) {
                if (line.trim().isEmpty) continue;
                Iterable<RegExpMatch> matches = timeRegex.allMatches(line);
                
                if (matches.length >= 2) {
                  int h1 = int.parse(matches.elementAt(0).group(1)!);
                  int m1 = int.parse(matches.elementAt(0).group(2)!);
                  int h2 = int.parse(matches.elementAt(1).group(1)!);
                  int m2 = int.parse(matches.elementAt(1).group(2)!);

                  DateTime time1 = DateTime(now.year, now.month, now.day, h1, m1);
                  DateTime time2 = DateTime(now.year, now.month, now.day, h2, m2);

                  if (time1.isBefore(now)) time1 = time1.add(const Duration(days: 1));
                  if (time2.isBefore(now)) time2 = time2.add(const Duration(days: 1));

                  DateTime firstAlarmTime = time1.subtract(const Duration(minutes: 10));

                  newRawData.add("HEAD|$h1|$m1");

                  if (firstAlarmTime.isAfter(now)) {
                    int id1 = alarmIdCounter;
                    Duration duration1 = firstAlarmTime.difference(now);
                    await AndroidAlarmManager.oneShot(duration1, id1, fireAlarmCallback, exact: true, wakeup: true);
                    newRawData.add("PLATFORM|${firstAlarmTime.hour}|${firstAlarmTime.minute}");
                  } else {
                    newRawData.add("PLATFORM|${firstAlarmTime.hour}|${firstAlarmTime.minute}");
                  }

                  int id2 = alarmIdCounter + 1;
                  Duration duration2 = time2.difference(now);
                  await AndroidAlarmManager.oneShot(duration2, id2, fireAlarmCallback, exact: true, wakeup: true);
                  newRawData.add("MOVE|${time2.hour}|${time2.minute}");
                  
                  alarmIdCounter += 2;
                }
              }

              if (newRawData.isEmpty) {
                ScaffoldMessenger.of(context).showSnackBar(
                  const SnackBar(content: Text('⚠️ هیچ خط زمانی معتبری یافت نشد!'))
                );
                return;
              }

              rawAlarmsData = newRawData;
              _saveData(text, rawAlarmsData);
              _updateRemainingTimesDisplay();
              
              ScaffoldMessenger.of(context).showSnackBar(
                const SnackBar(backgroundColor: Colors.green, content: Text('✅ آلارم‌ها با موفقیت رزرو و تایمرها فعال شدند.'))
              );
            }

            void runFastTest() async {
              await AndroidAlarmManager.oneShot(const Duration(seconds: 5), 888, fireAlarmCallback, exact: true, wakeup: true);
              setState(() {
                displayLogs = ["🧪 تست فعال شد: آلارم آزمایشی ۵ ثانیه دیگر شلیک می‌شود. (برنامه باز بماند)"];
              });
            }

            void clearAll() async {
              final prefs = await SharedPreferences.getInstance();
              await flutterLocalNotificationsPlugin.cancelAll();
              for (int i = 1; i < 100; i++) {
                await AndroidAlarmManager.cancel(i);
              }
              await AndroidAlarmManager.cancel(888);
              await prefs.clear();
              setState(() { _controller.clear(); rawAlarmsData.clear(); displayLogs.clear(); });
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text('سیستم بومی آلارم راهبران')),
                body: Padding(
                  padding: const EdgeInsets.all(16.0),
                  child: Column(
                    children: [
                      TextField(controller: _controller, maxLines: 5, onChanged: (text) => _saveData(text, rawAlarmsData), style: const TextStyle(fontSize: 15), decoration: const InputDecoration(hintText: 'متن پیام اعزام روزانه را پیست کنید...', border: OutlineInputBorder())),
                      const SizedBox(height: 12),
                      ElevatedButton(style: ElevatedButton.styleFrom(backgroundColor: Colors.green, minimumSize: const Size.fromHeight(48)), onPressed: processTextAndSetAlarms, child: const Text('⚡ استخراج ساعت و تنظیم خودکار آلارم‌ها')),
                      const SizedBox(height: 8),
                      ElevatedButton(style: ElevatedButton.styleFrom(backgroundColor: Colors.amber, foregroundColor: Colors.black, minimumSize: const Size.fromHeight(48)), onPressed: runFastTest, child: const Text('🧪 تست آلارم سریع (۵ ثانیه بعد)')),
                      const SizedBox(height: 8),
                      ElevatedButton(style: ElevatedButton.styleFrom(backgroundColor: Colors.red, minimumSize: const Size.fromHeight(48)), onPressed: clearAll, child: const Text('❌ پاک کردن تمام آلارم‌ها')),
                      const SizedBox(height: 15),
                      Expanded(child: displayLogs.isEmpty ? const Center(child: Text('هیچ آلارم فعالی وجود ندارد')) : ListView.builder(itemCount: displayLogs.length, itemBuilder: (context, index) {
                        bool childLine = displayLogs[index].startsWith('  ');
                        return ListTile(
                          dense: true,
                          leading: Icon(childLine ? Icons.alarm : Icons.timelapse, color: childLine ? (displayLogs[index].contains('🔹') ? Colors.blue : Colors.amber) : Colors.green),
                          title: Text(displayLogs[index], style: TextStyle(fontSize: 13, fontWeight: childLine ? FontWeight.normal : FontWeight.bold, color: displayLogs[index].contains('✅') ? Colors.grey : Colors.white)),
                        );
                      }))
                    ],
                  ),
                ),
              );
            }
          }
          EOF

          # ۲. ساخت فایل پکیج‌ها
          cat << 'EOF' > pubspec.yaml
          name: train_alarm_app
          description: "A new Flutter project for train drivers."
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
            android_alarm_manager_plus: ^4.0.8
            flutter_local_notifications: ^17.2.2
            shared_preferences: ^2.2.3
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          flutter:
            uses-material-design: true
          EOF

          # ۳. تنظیم دسترسی‌های مانیفست اندروید
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>\n    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM"/>\n    <uses-permission android:name="android.permission.USE_EXACT_ALARM"/>\n    <uses-permission android:name="android.permission.VIBRATE"/>' $MANIFEST_PATH
          sed -i '/<activity/i \        <service android:name="dev.fluttercommunity.androidalarmmanager.AlarmService" android:permission="android.permission.BIND_JOB_SERVICE" android:exported="false" />\n        <receiver android:name="dev.fluttercommunity.androidalarmmanager.AlarmBroadcastReceiver" android:exported="false" />\n        <receiver android:name="dev.fluttercommunity.androidalarmmanager.RebootBroadcastReceiver" android:exported="false">\n            <intent-filter>\n                <action android:name="android.intent.action.BOOT_COMPLETED" />\n            </intent-filter>\n        </receiver>' $MANIFEST_PATH
          sed -i 's/android:label=".*"/android:label="آلارم راهبران"/' $MANIFEST_PATH

          # ۴. تنظیمات کامل build.gradle.kts
          cat << 'EOF' > android/app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("kotlin-android")
              id("dev.flutter.flutter-gradle-plugin")
          }

          android {
              namespace = "com.example.train_alarm_app"
              compileSdk = flutter.compileSdkVersion

              compileOptions {
                  isCoreLibraryDesugaringEnabled = true
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              defaultConfig {
                  applicationId = "com.example.train_alarm_app"
                  minSdk = 21
                  targetSdk = flutter.targetSdkVersion
                  versionCode = flutter.versionCode
                  versionName = flutter.versionName
              }

              buildTypes {
                  release {
                      signingConfig = signingConfigs.getByName("debug")
                  }
              }
          }

          tasks.withType<org.jetbrains.kotlin.gradle.tasks.KotlinCompile>().configureEach {
              compilerOptions {
                  jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17)
              }
          }

          dependencies {
              coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")
          }
          EOF

      - name: Get Packages
        run: flutter pub get
        
      - name: Build Release APK
        run: flutter build apk --release
        
      # ⚡ تغییر کلیدی: آدرس‌دهی هوشمند و سرتاسری برای پیدا کردن قطعی فایل APK در هر کجای پروژه
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "**/app-release.apk"
