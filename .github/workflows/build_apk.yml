name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Auto Create and Repair Project
        run: |
          rm -rf lib pubspec.yaml android windows linux web ios macos analysis_options.yaml
          flutter create --org com.example --project-name train_alarm_app .
          
          # ۱. کدهای فلاتر متمرکز بر سیستم سیر و نمودار گراف قطار
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:shared_preferences/shared_preferences.dart';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(const TrainGraphApp());
          }

          class TrainGraphApp extends StatelessWidget {
            const TrainGraphApp({Key? key}) : super(key: key);
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                title: 'نمودار سیر راهبران',
                theme: ThemeData.dark().copyWith(
                  scaffoldBackgroundColor: const Color(0xFF121212),
                  primaryColor: Colors.green,
                ),
                home: const HomeScreen(),
              );
            }
          }

          // مدل داده‌ای برای ذخیره هر خط سیر
          class TrainTrip {
            final String rawLine;
            final String type; // S or E
            final String startTime;
            final String endTime;
            TrainTrip({required this.rawLine, required this.type, required this.startTime, required this.endTime});
          }

          class HomeScreen extends StatefulWidget {
            const HomeScreen({Key? key}) : super(key: key);
            @override
            State<HomeScreen> createState() => _HomeScreenState();
          }

          class _HomeScreenState extends State<HomeScreen> {
            final TextEditingController _controller = TextEditingController();
            List<TrainTrip> trips = [];

            @override
            void initState() {
              super.initState();
              _loadSavedText();
            }

            void _loadSavedText() async {
              final prefs = await SharedPreferences.getInstance();
              setState(() {
                _controller.text = prefs.getString('raw_schedule_text') ?? '';
                if (_controller.text.isNotEmpty) {
                  _parseText(_controller.text);
                }
              });
            }

            void _saveText(String text) async {
              final prefs = await SharedPreferences.getInstance();
              await prefs.setString('raw_schedule_text', text);
            }

            void _parseText(String text) {
              List<TrainTrip> parsedTrips = [];
              List<String> lines = text.split('\n');
              RegExp timeRegex = RegExp(r'(\d{2}):(\d{2})');

              for (String line in lines) {
                String cleanLine = line.trim();
                if (cleanLine.isEmpty) continue;

                String type = "";
                if (cleanLine.startsWith("S") || cleanLine.startsWith("s")) type = "S";
                if (cleanLine.startsWith("E") || cleanLine.startsWith("e")) type = "E";

                if (type.isNotEmpty) {
                  Iterable<RegExpMatch> matches = timeRegex.allMatches(cleanLine);
                  if (matches.length >= 2) {
                    String t1 = matches.elementAt(0).group(0)!;
                    String t2 = matches.elementAt(1).group(0)!;
                    parsedTrips.add(TrainTrip(
                      rawLine: cleanLine,
                      type: type,
                      startTime: t1,
                      endTime: t2,
                    ));
                  }
                }
              }

              setState(() {
                trips = parsedTrips;
              });
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text('📋 سیستم تنظیم برنامه سیر قطار'), backgroundColor: Colors.black12, centerTitle: true),
                body: Padding(
                  padding: const EdgeInsets.all(16.0),
                  child: Column(
                    children: [
                      TextField(
                        controller: _controller,
                        maxLines: 5,
                        onChanged: _saveText,
                        style: const TextStyle(fontSize: 14, color: Colors.white),
                        decoration: const InputDecoration(
                          hintText: 'متن پیامک اعزام روزانه را اینجا پیست کنید...',
                          border: OutlineInputBorder(),
                          fillColor: Color(0xFF1E1E1E),
                          filled: true,
                        ),
                      ),
                      const SizedBox(height: 12),
                      ElevatedButton.icon(
                        style: ElevatedButton.styleFrom(backgroundColor: Colors.green, minimumSize: const Size.fromHeight(48)),
                        onPressed: () => _parseText(_controller.text),
                        icon: const Icon(Icons.analytics_outlined, color: Colors.white),
                        label: const Text('📊 پردازش و استخراج گراف حرکت', style: TextStyle(fontSize: 15, color: Colors.white)),
                      ),
                      const SizedBox(height: 15),
                      const Align(
                        alignment: Alignment.centerRight,
                        child: Text('👇 ردیف‌های اعزام ردیابی شده (برای مشاهده گراف کلیک کنید):', style: TextStyle(color: Colors.white70, fontSize: 13)),
                      ),
                      const SizedBox(height: 8),
                      Expanded(
                        child: trips.isEmpty
                            ? const Center(child: Text('هیچ مسیر اعزامی یافت نشد. متن را وارد کرده و دکمه بالا را بزنید.'))
                            : ListView.builder(
                                itemCount: trips.length,
                                itemBuilder: (context, index) {
                                  final trip = trips[index];
                                  bool isGhadir = trip.type == "S";
                                  return Card(
                                    color: const Color(0xFF1E1E1E),
                                    margin: const EdgeInsets.symmetric(vertical: 6),
                                    child: ListTile(
                                      leading: CircleAvatar(
                                        backgroundColor: isGhadir ? Colors.blue.withOpacity(0.2) : Colors.amber.withOpacity(0.2),
                                        child: Text(trip.type, style: TextStyle(color: isGhadir ? Colors.blue : Colors.amber, fontWeight: BallStyle().fontWeight)),
                                      ),
                                      title: Text(trip.rawLine, style: const TextStyle(fontSize: 14, letterSpacing: 1)),
                                      subtitle: Text(isGhadir ? 'مبدأ: غدیر 👈 مقصد: وکیل‌آباد' : 'مبدأ: وکیل‌آباد 👈 مقصد: غدیر', style: const TextStyle(color: Colors.white54, fontSize: 12)),
                                      trailing: const Icon(Icons.arrow_forward_ios, size: 16, color: Colors.green),
                                      onPressed: () {
                                        Navigator.push(
                                          context,
                                          MaterialPageRoute(builder: (context) => GraphScreen(trip: trip)),
                                        );
                                      },
                                    ),
                                  );
                                },
                              ),
                      ),
                    ],
                  ),
                ),
              );
            }
          }

          // تمدید متد کلیک لایف سناریو کارت
          extension CardClick on Card {
            Widget InkWellOnCard({required VoidCallback onPressed, required Widget child}) {
              return InkWell(onTap: onPressed, child: child);
            }
          }
          extension ListTileClick on ListTile {
            void onPressed(VoidCallback action) {
              // هدایت کلیک به سمت گراف صفحه بعد
            }
          }

          // 📈 صفحه جدید تفصیلی برای ترسیم و نمایش جدول زمانی گراف
          class GraphScreen extends StatelessWidget {
            final TrainTrip trip;
            const GraphScreen({Key? key, required this.trip}) : super(key: key);

            // محاسبه تجمعی ثانیه‌ها به زمان واقعی ساعت و دقیقه
            String _calculateStationTime(String startStr, int totalSecondsOffset) {
              List<String> parts = startStr.split(':');
              int hour = int.parse(parts[0]);
              int minute = int.parse(parts[1]);

              int baseTotalSeconds = (hour * 3600) + (minute * 60);
              int finalTotalSeconds = baseTotalSeconds + totalSecondsOffset;

              int finalHour = (finalTotalSeconds ~/ 3600) % 24;
              int finalMinute = (finalTotalSeconds % 3600) ~/ 60;
              int finalSecond = finalTotalSeconds % 60;

              return "${finalHour.toString().padLeft(2, '0')}:${finalMinute.toString().padLeft(2, '0')}:${finalSecond.toString().padLeft(2, '0')}";
            }

            @override
            Widget build(BuildContext context) {
              bool isGhadir = trip.type == "S";

              // ۱. داده‌های خام مسیر رفت (غدیر به وکیل‌آباد)
              final List<Map<String, dynamic>> ghadirToVakil = [
                {"name": "غدیر (مبدأ)", "sec": 0},
                {"name": "پروین اعتصامی", "sec": 152}, // 02:32
                {"name": "۱۷ شهریور", "sec": 238},    // + 01:26
                {"name": "بسیج", "sec": 350},         // + 01:52
                {"name": "امام خمینی", "sec": 457},    // + 01:47
                {"name": "شریعتی", "sec": 614},       // + 02:37
                {"name": "قائم", "sec": 716},         // + 01:42
                {"name": "طالقانی", "sec": 804},       // + 01:28
                {"name": "فلسطین", "sec": 916},       // + 01:52
                {"name": "خیام", "sec": 1038},        // + 02:02
                {"name": "آزادی", "sec": 1138},        // + 01:40
                {"name": "پارک ملت", "sec": 1270},     // + 02:12
                {"name": "کوثر", "sec": 1361},         // + 01:31
                {"name": "سید رضی", "sec": 1456},      // + 01:35
                {"name": "دانشجو", "sec": 1546},       // + 01:30
                {"name": "هفت تیر", "sec": 1639},      // + 01:33
                {"name": "صدف", "sec": 1729},         // + 01:30
                {"name": "صیاد شیرازی", "sec": 1822},  // + 01:33
                {"name": "اقبال لاهوری", "sec": 1920},  // + 01:38
                {"name": "نمایشگاه", "sec": 2025},     // + 01:45
                {"name": "کوهستان پارک", "sec": 2120},  // + 01:35
                {"name": "وکیل‌آباد (مقصد)", "sec": 2535}, // + 06:55
              ];

              // ۲. داده‌های خام مسیر برگشت (وکیل‌آباد به غدیر)
              final List<Map<String, dynamic>> vakilToGhadir = [
                {"name": "وکیل‌آباد (مبدأ)", "sec": 0},
                {"name": "کوهستان پارک", "sec": 240},  // 04:00
                {"name": "نمایشگاه", "sec": 340},     // + 01:40
                {"name": "اقبال لاهوری", "sec": 441},  // + 01:41
                {"name": "صیاد شیرازی", "sec": 526},  // + 01:25
                {"name": "صدف", "sec": 626},         // + 01:35
                {"name": "هفت تیر", "sec": 716},      // + 01:30
                {"name": "دانشجو", "sec": 810},       // + 01:34
                {"name": "سید رضی", "sec": 910},      // + 01:40
                {"name": "کوثر", "sec": 1027},        // + 01:57
                {"name": "پارک ملت", "sec": 1145},     // + 01:58
                {"name": "آزادی", "sec": 1246},        // + 01:41
                {"name": "خیام", "sec": 1373},        // + 02:07
                {"name": "فلسطین", "sec": 1490},       // + 01:57
                {"name": "طالقانی", "sec": 1589},       // + 01:39
                {"name": "قائم", "sec": 1708},         // + 01:59
                {"name": "شریعتی", "sec": 1835},       // + 02:07
                {"name": "امام خمینی", "sec": 1950},    // + 01:55
                {"name": "بسیج", "sec": 2042},         // + 01:32
                {"name": "۱۷ شهریور", "sec": 2122},    // + 01:20
                {"name": "پروین اعتصامی", "sec": 2297}, // + 02:55
                {"name": "غدیر (مقصد)", "sec": 2392},   // مجموع کل ثانیه‌ها
              ];

              final List<Map<String, dynamic>> activeRoute = isGhadir ? ghadirToVakil : vakilToGhadir;

              return Scaffold(
                appBar: AppBar(
                  title: Text(isGhadir ? '📈 گراف زمانی رفت (غدیر 👈 وکیل‌آباد)' : '📉 گراف زمانی برگشت (وکیل‌آباد 👈 غدیر)', style: const TextStyle(fontSize: 15)),
                  backgroundColor: Colors.black25,
                ),
                body: Container(
                  padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 8),
                  child: Column(
                    children: [
                      Container(
                        width: double.infinity,
                        padding: const EdgeInsets.all(12),
                        decoration: BoxDecoration(color: isGhadir ? Colors.blue.withOpacity(0.1) : Colors.amber.withOpacity(0.1), borderRadius: BorderRadius.circular(8)),
                        child: Text('⏰ ساعت اعزام از مبدأ: ${trip.endTime} | زمان پایان سیر: ${trip.startTime}', textAlign: TextAlign.center, style: const TextStyle(fontWeight: FontWeight.bold, fontSize: 13)),
                      ),
                      const SizedBox(height: 10),
                      Expanded(
                        child: ListView.builder(
                          itemCount: activeRoute.length,
                          itemBuilder: (context, index) {
                            final station = activeRoute[index];
                            String realTime = _calculateStationTime(trip.endTime, station["sec"]);

                            bool isTerminal = index == 0 || index == activeRoute.length - 1;

                            return IntrinsicHeight(
                              child: Row(
                                children: [
                                  // نمایش ساعت واقعی رسیدن به ایستگاه
                                  SizedBox(
                                    width: 85,
                                    child: Text(realTime, style: TextStyle(fontWeight: isTerminal ? FontWeight.bold : FontWeight.normal, color: isTerminal ? Colors.green : Colors.white, fontSize: 14, letterSpacing: 0.5)),
                                  ),
                                  // طراحی ریل و گره گرافیکی ایستگاه
                                  Column(
                                    children: [
                                      Container(
                                        width: 14,
                                        height: 14,
                                        decoration: BoxDecoration(
                                          color: isTerminal ? Colors.green : (isGhadir ? Colors.blue : Colors.amber),
                                          shape: BoxShape.circle,
                                          boxShadow: [BoxShadow(color: Colors.white10, blurRadius: 4)],
                                        ),
                                      ),
                                      if (index != activeRoute.length - 1)
                                        Expanded(
                                          child: Container(width: 3, color: Colors.white24),
                                        ),
                                    ],
                                  ),
                                  const SizedBox(width: 15),
                                  // نام ایستگاه
                                  Expanded(
                                    child: Padding(
                                      padding: const EdgeInsets.symmetric(vertical: 8.0),
                                      child: Text(
                                        station["name"],
                                        style: TextStyle(
                                          fontSize: 14,
                                          fontWeight: isTerminal ? FontWeight.bold : FontWeight.normal,
                                          color: isTerminal ? Colors.green : Colors.white90,
                                        ),
                                      ),
                                    ),
                                  ),
                                ],
                              ),
                            );
                          },
                        ),
                      ),
                    ],
                  ),
                ),
              );
            }
          }
          EOF

          # ۲. تنظیم پکیج‌های سبک بدون کتابخانه‌های مزاحم اندروید
          cat << 'EOF' > pubspec.yaml
          name: train_alarm_app
          description: "A graph visualization project for train drivers."
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
            shared_preferences: ^2.2.3
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          flutter:
            uses-material-design: true
          EOF

          # ۳. مانیفست ساده بدون دسترسی‌های سنگین
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label=".*"/android:label="گراف سیر راهبران"/' $MANIFEST_PATH

          # ۴. تنظیمات کامل build.gradle.kts
          cat << 'EOF' > android/app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("kotlin-android")
              id("dev.flutter.flutter-gradle-plugin")
          }

          android {
              namespace = "com.example.train_alarm_app"
              compileSdk = flutter.compileSdkVersion

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              defaultConfig {
                  applicationId = "com.example.train_alarm_app"
                  minSdk = 21
                  targetSdk = flutter.targetSdkVersion
                  versionCode = flutter.versionCode
                  versionName = flutter.versionName
              }

              buildTypes {
                  release {
                      signingConfig = signingConfigs.getByName("debug")
                  }
              }
          }
          EOF

      - name: Get Packages
        run: flutter pub get
        
      - name: Build Release APK
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "**/app-release.apk"
